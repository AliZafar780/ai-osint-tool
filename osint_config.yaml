# OSINT Tool Configuration File

api_keys:
  groq_api_key: "your_groq_api_key_here"
  urlscan_api_key: "public"  # or your API key
  
scan_options:
  timeout: 5
  max_threads: 20
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
  
port_scan:
  common_ports:
    - 21
    - 22
    - 23
    - 25
    - 53
    - 80
    - 110
    - 111
    - 135
    - 139
    - 143
    - 443
    - 445
    - 993
    - 995
    - 1723
    - 3306
    - 3389
    - 5432
    - 5900
    - 8080
    
subdomains:
  common_list:
    - www
    - mail
    - ftp
    - admin
    - test
    - dev
    - staging
    - api
    - blog
    - shop
    - portal
    - web
    - m
    - mobile
    - app
    - apps
    
urls:
  common_paths:
    - /robots.txt
    - /sitemap.xml
    - /.git/config
    - /.env
    - /composer.json
    - /wp-admin
    - /wp-login.php
    - /admin
    - /login
    - /api
    - /upload
    - /uploads
    
vulnerability_checks:
  - /.git/config
  - /.env
  - /phpinfo.php
  - /server-status
  - /wp-admin
  - /composer.json
  
output:
  format: "text"
  directory: "./osint_results"
  timestamp: true
